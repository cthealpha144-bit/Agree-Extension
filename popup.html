<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 340px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 12px;
        background-color: #ffffff;
        color: #000000;
      }

      .nutrition-card {
        border: 4px solid #000000;
        padding: 8px;
        box-sizing: border-box;
        position: relative;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title {
        font-size: 28px;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1;
        margin: 0;
        letter-spacing: -0.5px;
      }

      .settings-btn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        padding: 0 4px;
        user-select: none;
      }

      .subtitle {
        font-size: 13px;
        margin: 4px 0 8px 0;
      }

      /* Settings Tray Styles */
      .settings-tray {
        display: none;
        background-color: #f1f3f4;
        border: 2px solid #000000;
        padding: 8px;
        margin-bottom: 8px;
        font-size: 12px;
      }

      .settings-tray h3 {
        margin: 0 0 6px 0;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      .setting-control {
        margin-bottom: 4px;
      }

      .setting-control label {
        display: block;
        font-weight: bold;
        margin-bottom: 2px;
      }

      .setting-control select {
        width: 100%;
        padding: 4px;
        border: 1px solid #000000;
        box-sizing: border-box;
        font-size: 12px;
      }

      /* Core Layout Elements */
      .thick-bar {
        height: 8px;
        background-color: #000000;
        margin: 6px 0;
      }

      .thin-bar {
        height: 2px;
        background-color: #000000;
        margin: 6px 0;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        padding: 4px 0;
      }

      .grade-badge {
        font-weight: 900;
        background-color: #000000;
        color: #ffffff;
        padding: 2px 8px;
        border-radius: 4px;
        text-transform: uppercase;
      }

      .section-header {
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        margin: 8px 0 4px 0;
      }

      .data-points {
        margin-top: 4px;
      }

      .point-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-size: 12px;
        border-bottom: 1px solid #c0c0c0;
        padding: 6px 0;
      }

      .point-text {
        width: 75%;
        line-height: 1.3;
      }

      .risk-tag {
        font-weight: bold;
        font-size: 10px;
        text-transform: uppercase;
        padding: 1px 4px;
        border-radius: 3px;
      }

      /* Tag Colors Mapping */
      .tag-safe {
        background-color: #e6f4ea;
        color: #137333;
      }
      .tag-warning {
        background-color: #fef7e0;
        color: #b06000;
      } /* New Medium Color */
      .tag-neutral {
        background-color: #f1f3f4;
        color: #3c4043;
      }
      .tag-risk {
        background-color: #fce8e6;
        color: #c5221f;
      }

      .footer {
        font-size: 9px;
        line-height: 1.2;
        margin-top: 10px;
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <div class="nutrition-card">
      <div class="header-row">
        <h1 class="title">Privacy Facts</h1>
        <button
          class="settings-btn"
          id="toggle-settings"
          title="Engine Settings"
        >
          ⚙️
        </button>
      </div>
      <div class="subtitle">Data Practices Summary</div>

      <div class="settings-tray" id="settings-tray">
        <h3>Engine Preferences</h3>
        <div class="setting-control">
          <label for="api-source">Active Intelligence Source</label>
          <select id="api-source">
            <option value="local">Local Database / Smart Predictor</option>
            <option value="tosdr">ToS;DR Legal Terms API</option>
            <option value="duckduckgo">DuckDuckGo Tracker Radar</option>
            <option value="urlvoid">APIVoid / URLVoid Domain Safety</option>
          </select>
        </div>
      </div>

      <div class="thick-bar"></div>

      <div class="metric-row">
        <span><strong>Privacy Rating</strong></span>
        <span class="grade-badge" id="app-grade">Class ...</span>
      </div>

      <div class="thin-bar"></div>

      <div class="section-header">Key Tracker Breakdown</div>

      <div class="data-points" id="points-container">
        <div class="point-item">
          <span class="point-text">Assembling data structures...</span>
          <span class="risk-tag tag-neutral">Wait</span>
        </div>
      </div>

      <div class="thick-bar"></div>

      <div class="footer">
        * Open Source Engine Framework. Configure inputs dynamically inside the
        options panel above.
      </div>
    </div>

    <script src="database.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
