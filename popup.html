<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 340px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 12px;
        background-color: #ffffff;
        color: #000000;
      }

      /* Container holding the entire tabbed box architecture */
      .tabbed-container {
        position: relative;
        margin-top: 46px; /* Increased slightly to give the thick tabs breathing room */
      }

      /* Tabs Row Layout */
      .tabs-header {
        display: flex;
        position: absolute;
        top: -38px; /* Adjusted to flush perfectly with the 6px main border */
        left: 0;
        width: 100%;
        z-index: 2;
      }

      .tab-button {
        font-size: 24px;
        font-weight: 900;
        background-color: #ffffff;
        color: #888888;
        border: 6px solid #000000; /* Match the 6px thickness of the main content box */
        border-bottom: none; /* Keep the bottom open to merge with the frame */
        padding: 4px 16px;
        cursor: pointer;
        user-select: none;
        outline: none;
      }

      /* Unique corner alignments for the blueprint shapes */
      #tab-agree {
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
      }

      #tab-options {
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        margin-left: -6px; /* Flushes the 6px side borders together tightly without double-thick overlapping */
      }

      /* Active Tab State: Forces the button down to clip and hide the main frame's top border */
      .tab-button.active {
        color: #000000;
        padding-bottom: 10px; /* Pushes the white background downward to mask the main container border line */
        margin-bottom: -6px; /* Snaps perfectly into the 6px main container border gap */
        background-color: #ffffff;
        z-index: 3;
      }

      /* Main Data View Panel Wrapper */
      .main-content-box {
        border: 6px solid #000000; /* Keep this locked at 6px matching your design */
        padding: 16px 12px;
        min-height: 300px;
        background-color: #ffffff;
        position: relative;
        z-index: 1;
      }

      /* Layout Typography & Utilities */
      .title {
        font-size: 26px;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1;
        margin: 0;
        letter-spacing: -0.5px;
      }

      .subtitle {
        font-size: 13px;
        margin: 4px 0 12px 0;
        color: #333333;
      }

      .thick-bar {
        height: 8px;
        background-color: #000000;
        margin: 8px 0;
      }

      .thin-bar {
        height: 2px;
        background-color: #000000;
        margin: 8px 0;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        padding: 4px 0;
      }

      .grade-badge {
        font-weight: 900;
        color: #ffffff;
        padding: 4px 10px;
        border-radius: 4px;
        text-transform: uppercase;
        font-size: 14px;
        transition: background-color 0.2s ease; /* Smooth color shifting switch */
      }

      /* Dynamic Class Color Modifiers */
      .badge-safe {
        background-color: #137333 !important;
      } /* Green for A & B */
      .badge-warning {
        background-color: #b06000 !important;
      } /* Amber for C */
      .badge-risk {
        background-color: #c5221f !important;
      } /* Red for D & E */
      .badge-unknown {
        background-color: #000000 !important;
      } /* Black fallback */

      .section-header {
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        margin: 12px 0 6px 0;
      }

      .data-points {
        margin-top: 4px;
      }

      .point-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-size: 12px;
        border-bottom: 1px solid #e0e0e0;
        padding: 8px 0;
      }

      .point-text {
        width: 75%;
        line-height: 1.3;
      }

      .risk-tag {
        font-weight: bold;
        font-size: 10px;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 3px;
      }

      .tag-safe {
        background-color: #e6f4ea;
        color: #137333;
      }
      .tag-warning {
        background-color: #fef7e0;
        color: #b06000;
      }
      .tag-neutral {
        background-color: #f1f3f4;
        color: #3c4043;
      }
      .tag-risk {
        background-color: #fce8e6;
        color: #c5221f;
      }

      .footer {
        font-size: 9px;
        line-height: 1.3;
        margin-top: 14px;
        color: #666666;
      }

      /* Options Panel Centered Styling Card */
      .engine-preferences-card {
        border: 2px solid #000000;
        padding: 12px;
        margin-top: 60px; /* Centers it vertically inside the view frame */
      }

      .engine-preferences-card h3 {
        margin: 0 0 6px 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 900;
      }

      .setting-control label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
      }

      .setting-control select {
        width: 100%;
        padding: 6px;
        border: 1px solid #000000;
        background-color: #ffffff;
        font-size: 12px;
        outline: none;
      }

      /* Core Visibility Controller: Toggles panel visibility seamlessly */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="tabbed-container">
      <div class="tabs-header">
        <button class="tab-button active" id="tab-agree">Agree?</button>
        <button class="tab-button" id="tab-options">Options</button>
      </div>

      <div class="main-content-box">
        <div id="panel-agree">
          <h1 class="title">Privacy Facts</h1>
          <div class="subtitle">Data Practices Summary</div>

          <div class="thick-bar"></div>

          <div class="metric-row">
            <span><strong>Privacy Rating</strong></span>
            <span class="grade-badge" id="app-grade">Class ...</span>
          </div>

          <div class="thin-bar"></div>

          <div class="section-header">Key Tracker Breakdown</div>

          <div class="data-points" id="points-container">
            <div class="point-item">
              <span class="point-text">Assembling data structures...</span>
              <span class="risk-tag tag-neutral">Wait</span>
            </div>
          </div>

          <div class="thick-bar"></div>

          <div class="footer">
            * Open Source Engine Framework. Configure inputs dynamically inside
            the options panel above.
          </div>
        </div>

        <div id="panel-options" class="hidden">
          <div class="engine-preferences-card">
            <h3>Engine Preferences</h3>
            <div class="setting-control">
              <label for="api-source"
                ><strong>Active Intelligence Source</strong></label
              >
              <select id="api-source">
                <option value="local">Local Database / Smart Predictor</option>
                <option value="tosdr">ToS;DR Legal Terms API</option>
                <option value="duckduckgo">DuckDuckGo Tracker Radar</option>
                <option value="urlvoid">APIVoid / URLVoid Domain Safety</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="database.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
